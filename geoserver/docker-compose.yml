services:
  geoserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: bombsight-geoserver:2.28.0
    container_name: bombsight-geoserver
    ports:
      - "8080:8080"
    environment:
      SKIP_DEMO_DATA: "true"
      ENABLE_JSONP: "true"
      RUN_UNPRIVILEGED: "true"
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:?GEOSERVER_ADMIN_USER must be set}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:?GEOSERVER_ADMIN_PASSWORD must be set}
    restart: unless-stopped